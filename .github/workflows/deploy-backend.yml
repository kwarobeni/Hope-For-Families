name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp >/dev/null

      - name: Add deny-all .htaccess for backend folder
        run: |
          cat <<'EOF' > backend/.htaccess
          Require all denied
          EOF

      - name: Upload backend via lftp mirror
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }},${{ secrets.HOSTINGER_FTP_PASSWORD }}" \
            -e "
              set ftp:ssl-force true;
              set ssl:verify-certificate no;
              set net:timeout 30;
              set net:max-retries 5;
              set net:reconnect-interval-base 5;
              set ftp:passive-mode true;
              mirror --reverse --delete --verbose \
                --exclude-glob=node_modules/ \
                --exclude-glob=.env \
                --exclude-glob=.env.local \
                --exclude-glob=.env.production \
                --exclude-glob=uploads/ \
                backend/ backend/;
              bye
            " \
            "${{ secrets.HOSTINGER_FTP_SERVER }}"
