name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp >/dev/null

      - name: Add deny-all .htaccess for backend folder
        run: |
          cat <<'EOF' > backend/.htaccess
          Require all denied
          EOF

      - name: Upload backend via lftp mirror
        env:
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_SERVER }}
        run: |
          # Build lftp script file to avoid all shell-quoting issues
          cat > /tmp/upload.lftp <<'LFTP_SETTINGS'
          set ftp:ssl-force true
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 5
          set ftp:passive-mode true
          LFTP_SETTINGS

          cat >> /tmp/upload.lftp << LFTP_CMDS
          open -u "$FTP_USER,$FTP_PASS" "$FTP_HOST"
          mirror --reverse --delete --verbose --exclude-glob node_modules/ --exclude-glob .env --exclude-glob .env.local --exclude-glob .env.production --exclude-glob uploads/ backend/ backend/
          bye
          LFTP_CMDS

          echo "--- lftp script ---"
          cat /tmp/upload.lftp
          echo "--- running lftp ---"
          lftp -f /tmp/upload.lftp
