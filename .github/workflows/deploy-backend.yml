name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The FTP account is chrooted to public_html, so backend source necessarily
      # lands inside the web-served tree. Block direct HTTP access to it entirely
      # (Hostinger's Node.js app feature reverse-proxies /api/* separately once
      # configured; it doesn't need the raw files to be web-readable).
      - name: Add deny-all .htaccess for backend folder
        run: |
          mkdir -p backend
          cat <<'EOF' > backend/.htaccess
          Require all denied
          EOF

      # A prior run with dangerous-clean-slate deleted the remote backend/ directory
      # itself (not just its contents) before crashing. FTP-Deploy-Action only ever
      # creates folders *relative to* server-dir, never server-dir itself, so every
      # run since has failed at the first MKD with "550 db: No such file or
      # directory". Recreate it out-of-band first; mkdir -p is a no-op if it's
      # already there, so this is safe on every future run too.
      - name: Ensure remote backend directory exists
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp >/dev/null
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }},${{ secrets.HOSTINGER_FTP_PASSWORD }}" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; mkdir -p backend; bye" \
            "${{ secrets.HOSTINGER_FTP_SERVER }}"

      # Uploads backend source (no node_modules, no .env, uploads/ left alone on the
      # server). Hostinger's Business plan Node.js app doesn't expose a remote way to
      # run `npm install` or restart the process over plain FTP, so after this step
      # finishes you still need to, in hPanel -> Advanced -> Node.js:
      #   1. Click "Run NPM Install" on the app
      #   2. Click "Restart"
      # If your plan has SSH access, see backend/HOSTINGER_DEPLOY.md for a one-line
      # SSH command to automate both from this workflow instead.
      # Hostinger's FTPS occasionally drops the control-socket connection
      # before any file transfer starts (a plain network blip, not a config
      # problem). Retry once after a short cooldown rather than failing the
      # whole deploy on a transient hiccup.
      - name: Upload backend source to Hostinger
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: backend/
          server-dir: ./backend/
          state-name: .ftp-deploy-sync-state-backend.json
          exclude: |
            **/node_modules/**
            **/.env
            **/.env.*
            **/uploads/**

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Retry upload backend source to Hostinger
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: backend/
          server-dir: ./backend/
          state-name: .ftp-deploy-sync-state-backend.json
          exclude: |
            **/node_modules/**
            **/.env
            **/.env.*
            **/uploads/**

      - name: Fail if both deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: exit 1
