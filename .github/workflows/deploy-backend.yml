name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp >/dev/null

      - name: Add deny-all .htaccess for backend folder
        run: |
          cat > backend/.htaccess <<'EOF'
          Require all denied
          EOF

      # Use lftp (control-channel only, known to work) to:
      # 1. Create backend/ if it doesn't exist
      # 2. Delete the stale sync-state file so FTP-Deploy-Action
      #    treats this as a fresh upload rather than skipping everything
      - name: Ensure backend dir exists and reset sync state
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USERNAME }},${{ secrets.HOSTINGER_FTP_PASSWORD }}" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; mkdir -p backend; glob -a rm backend/.ftp-deploy-sync-state-backend.json; bye" \
            "${{ secrets.HOSTINGER_FTP_SERVER }}" || true

      - name: Upload backend source to Hostinger
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: backend/
          server-dir: ./backend/
          state-name: .ftp-deploy-sync-state-backend.json
          exclude: |
            **/node_modules/**
            **/.env
            **/.env.*
            **/uploads/**

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Retry upload backend source
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: backend/
          server-dir: ./backend/
          state-name: .ftp-deploy-sync-state-backend.json
          exclude: |
            **/node_modules/**
            **/.env
            **/.env.*
            **/uploads/**

      - name: Fail if both deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: exit 1
