name: Deploy admin

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Write production env
        working-directory: admin
        run: echo "VITE_API_URL=${{ secrets.PUBLIC_API_URL }}" > .env

      - name: Build
        working-directory: admin
        run: npm run build

      - name: Add SPA fallback rewrite rule
        run: |
          cat <<'EOF' > admin/dist/.htaccess
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /admin/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /admin/index.html [L]
          </IfModule>
          EOF

      - name: Deploy to Hostinger (public_html/admin)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: admin/dist/
          server-dir: ./admin/
          state-name: .ftp-deploy-sync-state-admin.json
          # A previous run left an incomplete sync (some files uploaded, others
          # missing). dangerous-clean-slate forces a full wipe-and-reupload of
          # this isolated subfolder so the server state matches the build exactly.
          dangerous-clean-slate: true
