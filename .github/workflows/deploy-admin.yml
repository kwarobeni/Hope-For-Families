name: Deploy admin

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Write production env
        working-directory: admin
        run: echo "VITE_API_URL=${{ secrets.PUBLIC_API_URL }}" > .env

      - name: Build
        working-directory: admin
        run: npm run build

      - name: Deploy built SPA to Hostinger (public_html/admin_dist)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: admin/dist/
          server-dir: ./admin_dist/
          state-name: .ftp-deploy-sync-state-admin.json
          dangerous-clean-slate: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Retry deploy
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: admin/dist/
          server-dir: ./admin_dist/
          state-name: .ftp-deploy-sync-state-admin.json
          dangerous-clean-slate: true

      - name: Fail if both attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: exit 1
