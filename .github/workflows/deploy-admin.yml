name: Deploy admin

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Write production env
        working-directory: admin
        run: echo "VITE_API_URL=${{ secrets.PUBLIC_API_URL }}" > .env

      - name: Build
        working-directory: admin
        run: npm run build

      - name: Add SPA fallback rewrite rule
        run: |
          cat <<'EOF' > admin/dist/.htaccess
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /admin/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /admin/index.html [L]
          </IfModule>

          # Block direct HTTP access to Node.js server files
          <FilesMatch "^(start\.js|package\.json|package-lock\.json)$">
            Require all denied
          </FilesMatch>
          EOF

      # Hostinger locks the Node.js app root to admin/ and won't let us change it.
      # Copy start.js and a minimal package.json (with postinstall to install backend
      # deps) into dist so they land at public_html/admin/ alongside the Vite build.
      - name: Copy Node.js server files into dist
        run: |
          cp admin/start.js admin/dist/start.js
          cat <<'EOF' > admin/dist/package.json
          {
            "name": "hope-for-families-launcher",
            "version": "1.0.0",
            "type": "module",
            "scripts": {
              "start": "node start.js",
              "postinstall": "cd ../backend && npm install --omit=dev"
            }
          }
          EOF

      # Hostinger's FTPS occasionally drops the control-socket connection
      # before any file transfer starts (a plain network blip, not a config
      # problem). Retry once after a short cooldown rather than failing the
      # whole deploy on a transient hiccup.
      - name: Deploy to Hostinger (public_html/admin)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: admin/dist/
          server-dir: ./admin/
          state-name: .ftp-deploy-sync-state-admin.json
          # A previous run left an incomplete sync (some files uploaded, others
          # missing). dangerous-clean-slate forces a full wipe-and-reupload of
          # this isolated subfolder so the server state matches the build exactly.
          dangerous-clean-slate: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Retry deploy to Hostinger
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: admin/dist/
          server-dir: ./admin/
          state-name: .ftp-deploy-sync-state-admin.json
          dangerous-clean-slate: true

      - name: Fail if both deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: exit 1
