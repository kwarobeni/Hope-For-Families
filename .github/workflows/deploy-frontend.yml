name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'content/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Astro site
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_API_URL: https://hopeforfamiliescharity.org.uk/api

      - name: Package dist
        run: tar -czf frontend-dist.tar.gz -C frontend/dist .

      - name: Copy tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: "frontend-dist.tar.gz"
          target: "/tmp/"

      - name: Extract on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            DEST="/home/${{ secrets.SSH_USER }}/domains/hopeforfamiliescharity.org.uk/public_html/frontend"
            rm -rf "$DEST"
            mkdir -p "$DEST"
            tar -xzf /tmp/frontend-dist.tar.gz -C "$DEST"
            echo "Frontend deployed at $(date)"
