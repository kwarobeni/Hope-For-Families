name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Write production env
        working-directory: frontend
        run: |
          echo "PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }}" > .env
          echo "PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.PUBLIC_PAYPAL_CLIENT_ID }}" >> .env

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Hostinger (public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: frontend/dist/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-frontend.json
